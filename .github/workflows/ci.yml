name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Report a status for the merge queue's temporary branch, so the queue does
  # not wait forever for a check that never runs.
  merge_group:
  workflow_dispatch:
  # Refresh the reusable main result bundle when Solidity's moving develop
  # corpus changes even if this repository has no main push that day.
  schedule:
    - cron: "17 3 * * *"

# Keep only the latest run per branch/PR; cancel superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SVM_VERSION: "0.5.26"
  SOLC_VERSION: "0.8.35"

# The head pipeline is split so no expensive build is ever done twice on its
# critical path, and so the two independent build products fan out in parallel:
#
#   build ───────────────▶ proof/parser/correctness verification
#   gas-runner ─────┬────▶ solc-differential (Yul corpora, native)
#                   └────▶ solidity-gas       (Solidity corpora, native)
#
# `build` verifies the library once; `gas-runner` compiles the native
# `checkSolidityGas` executable once (a ~13-minute C compile of the
# whole dependency closure that previously ran in every matrix leg) and shares
# the binary. The native binary also dispatches the Yul/solc differential, so
# every fan-out leg only *runs* tests and never restores a full Lean workspace.
# Each leg is parallelised across
# the runner's cores by the runners themselves (see TEST_JOBS in the Lean
# scripts). WarpBuild 32-core runners make the one-time C compile and the
# per-leg execution both scale with cores. Which tests run is unchanged — only
# where they run and how the work is distributed. Pull requests also run the
# a resolved main SHA against the exact same resolved Solidity corpus SHA.
# Successful main and scheduled runs publish their summaries as an immutable
# bundle keyed by main SHA + corpus SHA. PRs reuse that bundle; only the first
# run for a genuinely new input pair falls back to executing main again.
jobs:
  # Resolve moving branch inputs once so every head/main leg sees the same
  # revisions. In particular, Solidity's develop branch must not advance
  # between the two runs or an upstream corpus change would look like a compiler
  # delta in the PR sticker.
  comparison-inputs:
    name: Resolve comparison inputs
    runs-on: ubuntu-latest
    outputs:
      main_sha: ${{ steps.revisions.outputs.main_sha }}
      solidity_sha: ${{ steps.revisions.outputs.solidity_sha }}
    steps:
      - name: Resolve main and Solidity develop
        id: revisions
        run: |
          main_sha=$(git ls-remote https://github.com/${{ github.repository }}.git refs/heads/main | cut -f1)
          solidity_sha=$(git ls-remote https://github.com/argotorg/solidity.git refs/heads/develop | cut -f1)
          [[ "$main_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$solidity_sha" =~ ^[0-9a-f]{40}$ ]]
          echo "main_sha=$main_sha" >> "$GITHUB_OUTPUT"
          echo "solidity_sha=$solidity_sha" >> "$GITHUB_OUTPUT"

  build:
    name: Build & verify
    needs: comparison-inputs
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache only this repository's comparatively small build output. A
      # content key lets documentation-only commits reuse it, while the restore
      # prefix gives Lake a safe incremental starting point for source changes.
      - name: Cache compiled library build
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: project-lake-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ hashFiles('YulEvmCompiler/**/*.lean', 'YulParser/**/*.lean', 'YulEvmCompilerTests/**/*.lean', 'scripts/*.lean') }}
          restore-keys: |
            project-lake-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-

      # Keep one manifest-keyed dependency cache instead of lean-action's
      # ~2.6GB full `.lake` cache for every commit. This includes Mathlib and
      # all transitive packages but excludes this repository's changing build.
      - name: Cache package builds
        uses: actions/cache@v4
        with:
          path: .lake/packages/*/.lake/build
          key: lake-package-builds-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      # lean-action installs the toolchain pinned in `lean-toolchain`, fetches
      # the prebuilt Mathlib olean cache (so Mathlib is not recompiled from
      # source), and runs `lake build` — which type-checks the whole
      # `YulEvmCompiler` library, including every proof and the `#eval`/`#guard`
      # examples. The semantics dependencies come from the cache step above (or
      # are compiled on a cache miss).
      - name: Build (fetch Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "false"
          use-github-cache: "false"

      # The project's soundness gate, recorded to a summary file for the PR
      # comment and failing the job if any part regresses. Four checks:
      #  - No `sorry` in sources: `lake build` treats `sorry` as a warning, so a
      #    textual scan guards against an incomplete proof slipping in.
      #  - Axiom footprint: the correctness theorems are proved with no `sorry`
      #    and only the three standard classical axioms; `Checks.lean` pins that
      #    set with `#guard_msgs`, so it fails if a `sorryAx` or new axiom appears.
      #  - Spec closure: `SpecClosure.lean` pins the exact audited specification
      #    surface each headline theorem is phrased in terms of; it fails if a
      #    declaration enters/leaves that surface or its meaning changes. It also
      #    regenerates SPEC.md.
      #  - SPEC.md up to date: the regenerated manifest must match what's checked in.
      - name: Verify soundness (sorry-free, axioms, spec surface)
        run: |
          mkdir -p ci-summary; f=ci-summary/soundness.txt; : > "$f"; ok=1
          if grep -rn --include='*.lean' -w 'sorry' \
              YulEvmCompiler YulParser YulEvmCompilerTests; then
            echo "::error::found a sorry in compiler, parser, or test-framework sources"
            echo "sorry_scan=fail" >> "$f"; ok=0
          else echo "sorry_scan=pass" >> "$f"; fi
          if lake env lean Checks.lean; then echo "axioms=pass" >> "$f"
          else echo "::error::axiom footprint changed"; echo "axioms=fail" >> "$f"; ok=0; fi
          if lake env lean SpecClosure.lean; then echo "spec_closure=pass" >> "$f"
          else echo "::error::audited spec surface changed"; echo "spec_closure=fail" >> "$f"; ok=0; fi
          if git diff --exit-code -- SPEC.md; then echo "spec_md=uptodate" >> "$f"
          else
            echo "::error::SPEC.md is stale — run 'lake env lean SpecClosure.lean' and commit"
            echo "spec_md=stale" >> "$f"; ok=0
          fi
          [ "$ok" = 1 ]

      # Fetch only the Yul test directories used below. Checked-in baselines
      # make current parser/compiler gaps explicit and detect stale entries.
      - name: Fetch Solidity Yul tests
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulSyntaxTests \
            test/libyul/yulInterpreterTests \
            test/libyul/yulOptimizerTests \
            test/libyul/objectCompiler \
            test/libyul/evmCodeTransform
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      # These steps tee their runner output into ci-summary/ so the pr-summary
      # job can turn it into a PR comment; `set -o pipefail` keeps the runner's
      # exit code (not tee's) as the step result.
      - parallel:
          - name: Check parser against Solidity syntax corpus
            run: |
              set -o pipefail; mkdir -p ci-summary
              lake env lean --run scripts/CheckSoliditySyntaxTests.lean \
                /tmp/solidity/test/libyul/yulSyntaxTests \
                test/solidity-yul-syntax-known-mismatches.txt \
                2>&1 | tee ci-summary/parsing-syntax.txt

          - name: Compile and execute latest-fork Solidity Yul interpreter tests
            run: |
              set -o pipefail; mkdir -p ci-summary
              lake env lean --run scripts/CheckSolidityInterpreterTests.lean \
                /tmp/solidity/test/libyul/yulInterpreterTests \
                test/solidity-yul-interpreter-known-failures.txt \
                2>&1 | tee ci-summary/parsing-interpreter.txt

          - name: Compile latest-fork Solidity positive compiler corpora
            run: |
              set -o pipefail; mkdir -p ci-summary; f=ci-summary/correctness-compile.txt; : > "$f"
              status=0
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                optimizer \
                /tmp/solidity/test/libyul/yulOptimizerTests \
                test/solidity-yul-optimizer-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                object-compiler \
                /tmp/solidity/test/libyul/objectCompiler \
                test/solidity-yul-object-compiler-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                EVM-code-transform \
                /tmp/solidity/test/libyul/evmCodeTransform \
                test/solidity-yul-evm-code-transform-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              exit "$status"

      - name: Upload CI summary (build)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-build
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  # Compile the native corpus executable exactly once, in parallel
  # with `build`. This is the ~13-minute step (it compiles the whole dependency
  # closure — Mathlib included — to native code) that used to run in every
  # differential leg; a 32-core runner makes the C compile itself much faster,
  # and the binary is statically linked, so the downstream gas jobs need only the
  # artifact plus solc — no Lean toolchain at all.
  gas-runner:
    name: Build native corpus runner
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gas runner binary
        id: gas-runner-cache
        uses: actions/cache@v4
        with:
          path: .lake/build/bin/checkSolidityGas
          key: gas-runner-bin-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ hashFiles('YulEvmCompiler/**/*.lean', 'YulParser/**/*.lean', 'YulEvmCompilerTests/**/*.lean', 'scripts/CheckSolidityGas.lean') }}

      - name: Cache package builds
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          path: .lake/packages/*/.lake/build
          key: lake-package-builds-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Set up Lean and fetch Mathlib cache
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "false"
          test: "false"
          lint: "false"
          use-github-cache: "false"

      # Compiling large real-world contracts recurses deeper than the Lean
      # interpreter's stack allows, so the gas runner is a native executable
      # rather than `lean --run`.
      - name: Build Solidity gas runner (native)
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        run: lake build checkSolidityGas

      - name: Upload gas runner binary
        uses: actions/upload-artifact@v4
        with:
          name: gas-runner-bin
          path: .lake/build/bin/checkSolidityGas
          retention-days: 1

  solc-differential:
    name: solc differential (${{ matrix.name }})
    needs: [comparison-inputs, gas-runner]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: direct corpora
            kind: direct
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-16x
          # The optimizer corpus is split across machines AND each leg runs its
          # fixtures across all the runner's cores (TEST_JOBS), so a few shards
          # on 32-core runners cover it quickly.
          - name: optimizer 1/5
            kind: optimizer
            shard_index: 0
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 2/5
            kind: optimizer
            shard_index: 1
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 3/5
            kind: optimizer
            shard_index: 2
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 4/5
            kind: optimizer
            shard_index: 3
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 5/5
            kind: optimizer
            shard_index: 4
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore native corpus runner
        uses: actions/download-artifact@v4
        with:
          name: gas-runner-bin
          path: .lake/build/bin
      - name: Make corpus runner executable
        run: chmod +x .lake/build/bin/checkSolidityGas

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then
            svm install "$SOLC_VERSION"
          fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch Solidity Yul corpora
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulOptimizerTests \
            test/libyul/objectCompiler \
            test/libyul/evmCodeTransform
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      # Behavior AND gas for the Yul corpora: each differential invocation also
      # takes a per-suite gas baseline and fails if this compiler's total gas for
      # a fixture rises above its pinned figure while solc's is unchanged. Re-pin
      # with scripts/update-gas.sh after an intended codegen or solc change.
      - name: Differentially execute against solc
        run: |
          set -o pipefail
          mkdir -p ci-summary
          f="ci-summary/diff-${{ matrix.kind }}-${{ matrix.shard_index }}.txt"; : > "$f"
          if [[ "${{ matrix.kind }}" == "optimizer" ]]; then
            .lake/build/bin/checkSolidityGas --yul-differential \
              optimizer \
              /tmp/solidity/test/libyul/yulOptimizerTests \
              test/solidity-yul-optimizer-known-solc-differential-failures.txt \
              test/solidity-yul-optimizer-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}" 2>&1 | tee -a "$f"
          else
            status=0
            .lake/build/bin/checkSolidityGas --yul-differential \
              object-compiler \
              /tmp/solidity/test/libyul/objectCompiler \
              test/solidity-yul-object-compiler-known-solc-differential-failures.txt \
              test/solidity-yul-object-compiler-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 2>&1 | tee -a "$f" || status=1
            .lake/build/bin/checkSolidityGas --yul-differential \
              EVM-code-transform \
              /tmp/solidity/test/libyul/evmCodeTransform \
              test/solidity-yul-evm-code-transform-known-solc-differential-failures.txt \
              test/solidity-yul-evm-code-transform-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 2>&1 | tee -a "$f" || status=1
            exit "$status"
          fi

      - name: Upload CI summary (differential)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-diff-${{ matrix.kind }}-${{ matrix.shard_index }}
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  solidity-gas:
    name: Solidity gas (${{ matrix.name }})
    needs: [comparison-inputs, gas-runner]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Curated gasTests: strict (every contract must compile). Small corpus,
          # one leg.
          - name: gasTests
            kind: gasTests
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-8x
          # Curated Uniswap v4-core fixtures checked into this repo
          # (test/uniswap-v4): real production DeFi code, strict against a
          # known-compile-failures list that records which fixtures still sit
          # beyond the compiler's supported fragment.
          - name: Uniswap v4
            kind: uniswap
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-16x
          # Curated Aave v4 fixtures checked into this repo (test/aave-v4):
          # strict compilation frontier plus realistic upstream-derived bitmap
          # stress scenarios with per-call gas baselines.
          - name: Aave v4
            kind: aave
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-32x
          # semanticTests: the large real-world corpus, lenient, sharded across
          # legs; each leg runs its shard across all cores (TEST_JOBS).
          - name: semanticTests 1/3
            kind: semantic
            shard_index: 0
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
          - name: semanticTests 2/3
            kind: semantic
            shard_index: 1
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
          - name: semanticTests 3/3
            kind: semantic
            shard_index: 2
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The gas runner is a statically linked native binary, so no Lean toolchain
      # is needed here — just the binary and solc.
      - name: Restore gas runner binary
        uses: actions/download-artifact@v4
        with:
          name: gas-runner-bin
          path: .lake/build/bin
      - name: Make gas runner executable
        run: chmod +x .lake/build/bin/checkSolidityGas

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then
            svm install "$SOLC_VERSION"
          fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch Solidity gas corpora
        if: ${{ matrix.kind != 'uniswap' && matrix.kind != 'aave' }}
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            git -C /tmp/solidity sparse-checkout set test/libsolidity/gasTests
          else
            git -C /tmp/solidity sparse-checkout set test/libsolidity/semanticTests
          fi
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      # Compile each contract through solc's --via-ir pipeline and gas-compare the
      # optimized runtime against solc's; fails if a contract stops compiling or
      # its gas rises above the pin. gasTests is strict; semanticTests is lenient
      # (real-world corpus with many unsupported features) and sharded; the
      # Uniswap v4-core and Aave v4 fixtures live in this repo and are strict
      # against known-compile-failures lists (see test/README.md).
      - name: Compile and gas-check Solidity contracts
        run: |
          set -o pipefail
          ulimit -s unlimited || true
          mkdir -p ci-summary
          f="ci-summary/gas-${{ matrix.kind }}-${{ matrix.shard_index }}.txt"; : > "$f"
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/gasTests \
              test/solidity-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 2>&1 | tee -a "$f"
          elif [[ "${{ matrix.kind }}" == "uniswap" ]]; then
            .lake/build/bin/checkSolidityGas \
              test/uniswap-v4 \
              test/uniswap-v4-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              --known=test/uniswap-v4-known-compile-failures.txt 2>&1 | tee -a "$f"
          elif [[ "${{ matrix.kind }}" == "aave" ]]; then
            .lake/build/bin/checkSolidityGas \
              test/aave-v4 \
              test/aave-v4-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              --known=test/aave-v4-known-compile-failures.txt 2>&1 | tee -a "$f"
          else
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/semanticTests \
              test/solidity-semantic-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}" --lenient 2>&1 | tee -a "$f"
          fi

      - name: Upload CI summary (gas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-gas-${{ matrix.kind }}-${{ matrix.shard_index }}
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  # A main commit is immutable, as are the pinned solc binary and resolved
  # Solidity corpus SHA. Persist its small result files once so every PR does
  # not spend another full set of 32-core runners recomputing the same rows.
  publish-main-baseline:
    name: Publish reusable main baseline
    needs: [comparison-inputs, build, gas-runner, solc-differential, solidity-gas]
    if: >-
      ${{ always() && github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'schedule' ||
           github.event_name == 'workflow_dispatch') &&
          needs.build.result == 'success' && needs.gas-runner.result == 'success' &&
          needs.solc-differential.result == 'success' && needs.solidity-gas.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download main summaries
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          path: main-baseline/summaries
          merge-multiple: true

      - name: Record exact baseline inputs
        env:
          MAIN_SHA: ${{ github.sha }}
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          printf 'main_sha=%s\nsolidity_sha=%s\nsolc_version=%s\nschema=2\n' \
            "$MAIN_SHA" "$SOLIDITY_SHA" "$SOLC_VERSION" > main-baseline/metadata.env

      - name: Upload reusable main baseline
        uses: actions/upload-artifact@v4
        with:
          name: main-baseline-${{ github.sha }}-${{ needs.comparison-inputs.outputs.solidity_sha }}
          path: main-baseline
          retention-days: 30

  # Look for the exact main-SHA + Solidity-SHA bundle. The fallback baseline
  # jobs below run only when a bundle is absent, such as the first PR after an
  # upstream corpus update. Downloaded results are re-uploaded under the normal
  # current-run prefix so the summary job has one simple input path.
  baseline-lookup:
    name: Restore reusable main baseline
    if: ${{ github.event_name == 'pull_request' }}
    needs: comparison-inputs
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      hit: ${{ steps.verify.outputs.hit }}
    steps:
      - name: Find exact main baseline artifact
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MAIN_SHA: ${{ needs.comparison-inputs.outputs.main_sha }}
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          name="main-baseline-$MAIN_SHA-$SOLIDITY_SHA"
          run_id=$(gh api "repos/$REPO/actions/artifacts?name=$name&per_page=10" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download exact main baseline
        id: download
        if: ${{ steps.find.outputs.run_id != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: cached-main
          github-token: ${{ github.token }}
          run-id: ${{ steps.find.outputs.run_id }}

      - name: Verify restored metadata
        id: verify
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          MAIN_SHA: ${{ needs.comparison-inputs.outputs.main_sha }}
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          hit=false
          if [ "$DOWNLOAD_OUTCOME" = success ] && [ -f cached-main/metadata.env ]; then
            set -a; . cached-main/metadata.env; set +a
            if [ "$main_sha" = "$MAIN_SHA" ] && [ "$solidity_sha" = "$SOLIDITY_SHA" ] && \
                [ "$solc_version" = "$SOLC_VERSION" ] && [ "$schema" = 2 ]; then
              hit=true
            fi
          fi
          echo "hit=$hit" >> "$GITHUB_OUTPUT"

      - name: Upload restored summaries for this run
        if: ${{ steps.verify.outputs.hit == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: baseline-summary-cached
          path: cached-main/summaries
          retention-days: 1

  # Cache-miss-only fallback: compile and test the resolved main commit against
  # the exact same Solidity revision as the head jobs. The common path restores
  # the immutable result bundle above instead.
  baseline-build:
    name: Main baseline build & verify
    if: ${{ github.event_name == 'pull_request' && needs.baseline-lookup.outputs.hit != 'true' }}
    needs: [comparison-inputs, baseline-lookup]
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.comparison-inputs.outputs.main_sha }}

      - name: Cache compiled main library build
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: project-lake-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ hashFiles('YulEvmCompiler/**/*.lean', 'YulParser/**/*.lean', 'YulEvmCompilerTests/**/*.lean', 'scripts/*.lean') }}
          restore-keys: |
            project-lake-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-

      - name: Cache package builds
        uses: actions/cache@v4
        with:
          path: .lake/packages/*/.lake/build
          key: lake-package-builds-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Build main (fetch Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "false"
          use-github-cache: "false"

      - name: Verify main soundness
        run: |
          mkdir -p ci-summary; f=ci-summary/soundness.txt; : > "$f"; ok=1
          if grep -rn --include='*.lean' -w 'sorry' \
              YulEvmCompiler YulParser YulEvmCompilerTests; then
            echo "::error::found a sorry in main compiler, parser, or test-framework sources"
            echo "sorry_scan=fail" >> "$f"; ok=0
          else echo "sorry_scan=pass" >> "$f"; fi
          if lake env lean Checks.lean; then echo "axioms=pass" >> "$f"
          else echo "::error::main axiom footprint changed"; echo "axioms=fail" >> "$f"; ok=0; fi
          if lake env lean SpecClosure.lean; then echo "spec_closure=pass" >> "$f"
          else echo "::error::main audited spec surface changed"; echo "spec_closure=fail" >> "$f"; ok=0; fi
          if git diff --exit-code -- SPEC.md; then echo "spec_md=uptodate" >> "$f"
          else echo "::error::main SPEC.md is stale"; echo "spec_md=stale" >> "$f"; ok=0; fi
          [ "$ok" = 1 ]

      - name: Fetch pinned Solidity Yul tests
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulSyntaxTests \
            test/libyul/yulInterpreterTests \
            test/libyul/yulOptimizerTests \
            test/libyul/objectCompiler \
            test/libyul/evmCodeTransform
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      - parallel:
          - name: Check main parser against Solidity syntax corpus
            run: |
              set -o pipefail; mkdir -p ci-summary
              lake env lean --run scripts/CheckSoliditySyntaxTests.lean \
                /tmp/solidity/test/libyul/yulSyntaxTests \
                test/solidity-yul-syntax-known-mismatches.txt \
                2>&1 | tee ci-summary/parsing-syntax.txt

          - name: Execute main on Solidity Yul interpreter tests
            run: |
              set -o pipefail; mkdir -p ci-summary
              lake env lean --run scripts/CheckSolidityInterpreterTests.lean \
                /tmp/solidity/test/libyul/yulInterpreterTests \
                test/solidity-yul-interpreter-known-failures.txt \
                2>&1 | tee ci-summary/parsing-interpreter.txt

          - name: Compile positive Solidity corpora with main
            run: |
              set -o pipefail; mkdir -p ci-summary; f=ci-summary/correctness-compile.txt; : > "$f"
              status=0
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                optimizer /tmp/solidity/test/libyul/yulOptimizerTests \
                test/solidity-yul-optimizer-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                object-compiler /tmp/solidity/test/libyul/objectCompiler \
                test/solidity-yul-object-compiler-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              lake env lean --run scripts/CheckSolidityCompileTests.lean \
                EVM-code-transform /tmp/solidity/test/libyul/evmCodeTransform \
                test/solidity-yul-evm-code-transform-known-compile-failures.txt 2>&1 | tee -a "$f" || status=1
              exit "$status"

      - name: Upload main CI summary (build)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-summary-build
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  baseline-gas-runner:
    name: Main baseline native corpus runner
    if: ${{ github.event_name == 'pull_request' && needs.baseline-lookup.outputs.hit != 'true' }}
    needs: [comparison-inputs, baseline-lookup]
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.comparison-inputs.outputs.main_sha }}

      - name: Cache main gas runner binary
        id: gas-runner-cache
        uses: actions/cache@v4
        with:
          path: .lake/build/bin/checkSolidityGas
          key: gas-runner-bin-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ hashFiles('YulEvmCompiler/**/*.lean', 'YulParser/**/*.lean', 'YulEvmCompilerTests/**/*.lean', 'scripts/CheckSolidityGas.lean') }}

      - name: Cache package builds
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          path: .lake/packages/*/.lake/build
          key: lake-package-builds-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Set up Lean and fetch main Mathlib cache
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "false"
          test: "false"
          lint: "false"
          use-github-cache: "false"

      - name: Build main Solidity gas runner (native)
        if: ${{ steps.gas-runner-cache.outputs.cache-hit != 'true' }}
        run: lake build checkSolidityGas

      - name: Upload main gas runner binary
        uses: actions/upload-artifact@v4
        with:
          name: baseline-gas-runner-bin
          path: .lake/build/bin/checkSolidityGas
          retention-days: 1

  baseline-solc-differential:
    name: Main solc differential (${{ matrix.name }})
    if: ${{ github.event_name == 'pull_request' && needs.baseline-lookup.outputs.hit != 'true' }}
    needs: [comparison-inputs, baseline-lookup, baseline-gas-runner]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: direct corpora
            kind: direct
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-16x
          - name: optimizer 1/5
            kind: optimizer
            shard_index: 0
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 2/5
            kind: optimizer
            shard_index: 1
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 3/5
            kind: optimizer
            shard_index: 2
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 4/5
            kind: optimizer
            shard_index: 3
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
          - name: optimizer 5/5
            kind: optimizer
            shard_index: 4
            shard_count: 5
            runner: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.comparison-inputs.outputs.main_sha }}

      - name: Restore main native corpus runner
        uses: actions/download-artifact@v4
        with:
          name: baseline-gas-runner-bin
          path: .lake/build/bin

      - name: Make main corpus runner executable
        run: chmod +x .lake/build/bin/checkSolidityGas

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then svm install "$SOLC_VERSION"; fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch pinned Solidity Yul corpora
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulOptimizerTests test/libyul/objectCompiler test/libyul/evmCodeTransform
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      - name: Differentially execute main against solc
        run: |
          set -o pipefail
          mkdir -p ci-summary
          f="ci-summary/diff-${{ matrix.kind }}-${{ matrix.shard_index }}.txt"; : > "$f"
          if [[ "${{ matrix.kind }}" == "optimizer" ]]; then
            .lake/build/bin/checkSolidityGas --yul-differential \
              optimizer /tmp/solidity/test/libyul/yulOptimizerTests \
              test/solidity-yul-optimizer-known-solc-differential-failures.txt \
              test/solidity-yul-optimizer-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}" 2>&1 | tee -a "$f"
          else
            status=0
            .lake/build/bin/checkSolidityGas --yul-differential \
              object-compiler /tmp/solidity/test/libyul/objectCompiler \
              test/solidity-yul-object-compiler-known-solc-differential-failures.txt \
              test/solidity-yul-object-compiler-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 2>&1 | tee -a "$f" || status=1
            .lake/build/bin/checkSolidityGas --yul-differential \
              EVM-code-transform /tmp/solidity/test/libyul/evmCodeTransform \
              test/solidity-yul-evm-code-transform-known-solc-differential-failures.txt \
              test/solidity-yul-evm-code-transform-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 2>&1 | tee -a "$f" || status=1
            exit "$status"
          fi

      - name: Upload main CI summary (differential)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-summary-diff-${{ matrix.kind }}-${{ matrix.shard_index }}
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  baseline-solidity-gas:
    name: Main Solidity gas (${{ matrix.name }})
    if: ${{ github.event_name == 'pull_request' && needs.baseline-lookup.outputs.hit != 'true' }}
    needs: [comparison-inputs, baseline-lookup, baseline-gas-runner]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gasTests
            kind: gasTests
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-8x
          - name: Uniswap v4
            kind: uniswap
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-16x
          - name: Aave v4
            kind: aave
            shard_index: 0
            shard_count: 1
            runner: warp-ubuntu-2404-x64-32x
          - name: semanticTests 1/3
            kind: semantic
            shard_index: 0
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
          - name: semanticTests 2/3
            kind: semantic
            shard_index: 1
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
          - name: semanticTests 3/3
            kind: semantic
            shard_index: 2
            shard_count: 3
            runner: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.comparison-inputs.outputs.main_sha }}

      - name: Restore main gas runner binary
        uses: actions/download-artifact@v4
        with:
          name: baseline-gas-runner-bin
          path: .lake/build/bin

      - name: Make main gas runner executable
        run: chmod +x .lake/build/bin/checkSolidityGas

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then svm install "$SOLC_VERSION"; fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch pinned Solidity gas corpus
        if: ${{ matrix.kind != 'uniswap' && matrix.kind != 'aave' }}
        env:
          SOLIDITY_SHA: ${{ needs.comparison-inputs.outputs.solidity_sha }}
        run: |
          git init /tmp/solidity
          git -C /tmp/solidity remote add origin https://github.com/argotorg/solidity.git
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            git -C /tmp/solidity sparse-checkout set test/libsolidity/gasTests
          else
            git -C /tmp/solidity sparse-checkout set test/libsolidity/semanticTests
          fi
          git -C /tmp/solidity fetch --depth 1 --filter=blob:none origin "$SOLIDITY_SHA"
          git -C /tmp/solidity checkout --detach FETCH_HEAD

      - name: Compile and gas-check Solidity contracts with main
        run: |
          set -o pipefail
          ulimit -s unlimited || true
          mkdir -p ci-summary
          f="ci-summary/gas-${{ matrix.kind }}-${{ matrix.shard_index }}.txt"; : > "$f"
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/gasTests test/solidity-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 2>&1 | tee -a "$f"
          elif [[ "${{ matrix.kind }}" == "uniswap" ]]; then
            .lake/build/bin/checkSolidityGas \
              test/uniswap-v4 test/uniswap-v4-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              --known=test/uniswap-v4-known-compile-failures.txt 2>&1 | tee -a "$f"
          elif [[ "${{ matrix.kind }}" == "aave" ]]; then
            # A fallback can compare against a main commit from before the Aave
            # fixtures landed. In that case there is intentionally no base row;
            # the summary renders the head-only Aave corpus without failing.
            if [[ -d test/aave-v4 ]]; then
              .lake/build/bin/checkSolidityGas \
                test/aave-v4 test/aave-v4-gas-baseline.txt \
                "$SOLC_PATH" "$SOLC_VERSION" \
                --known=test/aave-v4-known-compile-failures.txt 2>&1 | tee -a "$f"
            fi
          else
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/semanticTests \
              test/solidity-semantic-gas-baseline.txt "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}" --lenient 2>&1 | tee -a "$f"
          fi

      - name: Upload main CI summary (gas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-summary-gas-${{ matrix.kind }}-${{ matrix.shard_index }}
          path: ci-summary
          retention-days: 1
          if-no-files-found: ignore

  # Aggregate every leg's captured summary into one sticky PR comment: parsing,
  # correctness, gas (vs solc-optimized AND codegen parity), soundness, verdict.
  # Runs on pull requests only; `always()` so it also reports failing runs (that
  # is when the summary is most useful). Needs no Lean toolchain.
  pr-summary:
    name: PR summary comment
    needs:
      - comparison-inputs
      - build
      - gas-runner
      - solc-differential
      - solidity-gas
      - baseline-lookup
      - baseline-build
      - baseline-gas-runner
      - baseline-solc-differential
      - baseline-solidity-gas
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    # Read-only: this job runs in the PR's context, so for fork-originated pull
    # requests GitHub caps GITHUB_TOKEN at read-only regardless of any elevation
    # requested here. Rendering the comment needs no write access; the actual
    # posting happens in the separate `pr-summary-comment` workflow, which is
    # triggered by `workflow_run` and therefore runs in the base-repo context
    # where `pull-requests: write` is honoured even for fork PRs.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download head summaries
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          path: summaries/head
          merge-multiple: true

      - name: Download main summaries
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: baseline-summary-*
          path: summaries/main
          merge-multiple: true

      - name: Render summary comment
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          GAS_RUNNER_RESULT: ${{ needs.gas-runner.result }}
          SOLC_DIFFERENTIAL_RESULT: ${{ needs.solc-differential.result }}
          SOLIDITY_GAS_RESULT: ${{ needs.solidity-gas.result }}
          MAIN_BUILD_RESULT: ${{ needs.baseline-lookup.outputs.hit == 'true' && 'success' || needs.baseline-build.result }}
          MAIN_GAS_RUNNER_RESULT: ${{ needs.baseline-lookup.outputs.hit == 'true' && 'success' || needs.baseline-gas-runner.result }}
          MAIN_SOLC_DIFFERENTIAL_RESULT: ${{ needs.baseline-lookup.outputs.hit == 'true' && 'success' || needs.baseline-solc-differential.result }}
          MAIN_SOLIDITY_GAS_RESULT: ${{ needs.baseline-lookup.outputs.hit == 'true' && 'success' || needs.baseline-solidity-gas.result }}
        run: |
          mkdir -p pr-comment
          python3 scripts/ci_pr_summary.py summaries/head \
            --base-summary-dir summaries/main \
            --sha "${{ github.event.pull_request.head.sha }}" \
            --base-sha "${{ needs.comparison-inputs.outputs.main_sha }}" \
            > pr-comment/comment.md
          cat pr-comment/comment.md >> "$GITHUB_STEP_SUMMARY"

      # Hand the rendered comment (plus the PR number, which the workflow_run
      # event does not reliably carry for fork PRs) to the posting workflow.
      - name: Record PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-comment/pr-number.txt

      - name: Upload rendered PR comment
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment
          path: pr-comment
          retention-days: 1
