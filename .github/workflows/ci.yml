name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Report a status for the merge queue's temporary branch, so the queue does
  # not wait forever for a check that never runs.
  merge_group:
  workflow_dispatch:

# Keep only the latest run per branch/PR; cancel superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SVM_VERSION: "0.5.26"
  SOLC_VERSION: "0.8.35"

# The pipeline is split so no expensive build is ever done twice on the critical
# path, and so the two independent build products fan out in parallel:
#
#   build ───────────────▶ solc-differential (yul corpora, `lean --run`)
#   gas-runner ──────────▶ solidity-gas       (gasTests + semanticTests, native)
#
# `build` compiles the library once and shares its oleans; `gas-runner` compiles
# the native `checkSolidityGas` executable once (a ~13-minute C compile of the
# whole dependency closure that previously ran in every matrix leg) and shares
# the binary. Both fan-outs then only *run* tests, each leg parallelised across
# the runner's cores by the runners themselves (see TEST_JOBS in the Lean
# scripts). WarpBuild 32-core runners make the one-time C compile and the
# per-leg execution both scale with cores. Which tests run is unchanged — only
# where they run and how the work is distributed.
jobs:
  build:
    name: Build & verify
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the compiled oleans of the two (large) semantics dependencies so
      # they are not recompiled from source every run — lean-action only caches
      # Mathlib. Keyed on the toolchain + pinned dependency revisions
      # (lake-manifest.json); on a miss, or if `lake`'s own trace hashing finds
      # the restored build stale, it simply rebuilds — so this is safe.
      - name: Cache dependency builds
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/yul-semantics/.lake/build
            .lake/packages/evm_semantics/.lake/build
          key: lake-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      # lean-action installs the toolchain pinned in `lean-toolchain`, fetches
      # the prebuilt Mathlib olean cache (so Mathlib is not recompiled from
      # source), and runs `lake build` — which type-checks the whole
      # `YulEvmCompiler` library, including every proof and the `#eval`/`#guard`
      # examples. The semantics dependencies come from the cache step above (or
      # are compiled on a cache miss).
      - name: Build (fetch Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "false"

      # Share the freshly compiled library oleans with the solc-differential
      # matrix so those jobs restore this build instead of recompiling the whole
      # library once per leg. Scoped to this run, so it is always the exact
      # commit; hidden files (lake's trace metadata) must be included or lake
      # would consider the restored build stale and rebuild anyway. A restore
      # miss just falls back to a normal `lake build`, so this is safe.
      - name: Upload compiled library build
        uses: actions/upload-artifact@v4
        with:
          name: lake-build
          path: .lake/build
          include-hidden-files: true
          retention-days: 1

      # `lake build` treats `sorry` as a warning, not an error, so guard against
      # an incomplete proof slipping in with a plain textual scan of the library
      # sources. (Checks.lean is excluded: it legitimately names `sorry` in its
      # docstrings, and any `sorry` reachable from the theorems would anyway be
      # caught by the axiom check below via `sorryAx`.)
      - name: Reject sorry in library sources
        run: |
          if grep -rn --include='*.lean' -w 'sorry' \
              YulEvmCompiler YulParser YulEvmCompilerTests; then
            echo "::error::found a sorry in compiler, parser, or test-framework sources"
            exit 1
          fi

      # The project's headline guarantee: the correctness theorems are proved
      # with no `sorry` and only the three standard classical axioms. `Checks.lean`
      # pins that axiom set with `#guard_msgs`, so this step fails if it ever
      # changes (e.g. a `sorryAx` or a new axiom appears).
      - name: Verify axiom footprint (sorry-free, standard axioms only)
        run: lake env lean Checks.lean

      # The audited *specification* boundary — the dual of the axiom check.
      # `SpecClosure.lean` walks each headline theorem's statement (never its
      # proof) to pin the exact set of match relations, frame conditions,
      # outcome maps, data types, and external-semantics entry points the
      # guarantee is phrased in terms of. Its `#guard_msgs` block fails if a
      # declaration enters or leaves the audited surface, or an audited
      # declaration's meaning changes — the signal that a human must re-audit
      # the spec. Elaborating it also regenerates SPEC.md (checked next). This
      # does NOT fire when the compiler algorithm or any proof changes: under
      # autoresearch, code and proofs may change freely as long as the pinned
      # spec surface does not.
      - name: Verify specification closure (audited spec surface pinned)
        run: lake env lean SpecClosure.lean

      - name: Specification manifest (SPEC.md) is up to date
        run: |
          if ! git diff --exit-code -- SPEC.md; then
            echo "::error::SPEC.md is stale — run 'lake env lean SpecClosure.lean' and commit the result"
            exit 1
          fi

      # Fetch only the Yul test directories used below. Checked-in baselines
      # make current parser/compiler gaps explicit and detect stale entries.
      - name: Fetch Solidity Yul tests
        run: |
          git clone --depth 1 --filter=blob:none --sparse --branch develop \
            https://github.com/argotorg/solidity.git /tmp/solidity
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulSyntaxTests \
            test/libyul/yulInterpreterTests \
            test/libyul/yulOptimizerTests \
            test/libyul/objectCompiler \
            test/libyul/evmCodeTransform

      - name: Check parser against Solidity syntax corpus
        run: |
          lake env lean --run scripts/CheckSoliditySyntaxTests.lean \
            /tmp/solidity/test/libyul/yulSyntaxTests \
            test/solidity-yul-syntax-known-mismatches.txt

      - name: Compile and execute latest-fork Solidity Yul interpreter tests
        run: |
          lake env lean --run scripts/CheckSolidityInterpreterTests.lean \
            /tmp/solidity/test/libyul/yulInterpreterTests \
            test/solidity-yul-interpreter-known-failures.txt

      - name: Compile latest-fork Solidity positive compiler corpora
        run: |
          status=0
          lake env lean --run scripts/CheckSolidityCompileTests.lean \
            optimizer \
            /tmp/solidity/test/libyul/yulOptimizerTests \
            test/solidity-yul-optimizer-known-compile-failures.txt || status=1
          lake env lean --run scripts/CheckSolidityCompileTests.lean \
            object-compiler \
            /tmp/solidity/test/libyul/objectCompiler \
            test/solidity-yul-object-compiler-known-compile-failures.txt || status=1
          lake env lean --run scripts/CheckSolidityCompileTests.lean \
            EVM-code-transform \
            /tmp/solidity/test/libyul/evmCodeTransform \
            test/solidity-yul-evm-code-transform-known-compile-failures.txt || status=1
          exit "$status"

  # Compile the native `checkSolidityGas` executable exactly once, in parallel
  # with `build`. This is the ~13-minute step (it compiles the whole dependency
  # closure — Mathlib included — to native code) that used to run in every
  # differential leg; a 32-core runner makes the C compile itself much faster,
  # and the binary is statically linked, so the downstream gas jobs need only the
  # artifact plus solc — no Lean toolchain at all.
  gas-runner:
    name: Build gas runner
    runs-on: warp-ubuntu-2404-x64-32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependency builds
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/yul-semantics/.lake/build
            .lake/packages/evm_semantics/.lake/build
          key: lake-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Build (fetch Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "false"

      # Compiling large real-world contracts recurses deeper than the Lean
      # interpreter's stack allows, so the gas runner is a native executable
      # rather than `lean --run`.
      - name: Build Solidity gas runner (native)
        run: lake build checkSolidityGas

      - name: Upload gas runner binary
        uses: actions/upload-artifact@v4
        with:
          name: gas-runner-bin
          path: .lake/build/bin/checkSolidityGas
          retention-days: 1

  solc-differential:
    name: solc differential (${{ matrix.name }})
    needs: build
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: direct corpora
            kind: direct
            shard_index: 0
            shard_count: 1
          # The optimizer corpus is split across machines AND each leg runs its
          # fixtures across all the runner's cores (TEST_JOBS), so a few shards
          # on 32-core runners cover it quickly.
          - name: optimizer 1/5
            kind: optimizer
            shard_index: 0
            shard_count: 5
          - name: optimizer 2/5
            kind: optimizer
            shard_index: 1
            shard_count: 5
          - name: optimizer 3/5
            kind: optimizer
            shard_index: 2
            shard_count: 5
          - name: optimizer 4/5
            kind: optimizer
            shard_index: 3
            shard_count: 5
          - name: optimizer 5/5
            kind: optimizer
            shard_index: 4
            shard_count: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependency builds
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/yul-semantics/.lake/build
            .lake/packages/evm_semantics/.lake/build
          key: lake-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      # Restore the library build produced once by the `build` job so the
      # `lake build` below is a trace-check no-op instead of a full recompile.
      - name: Restore compiled library build
        uses: actions/download-artifact@v4
        with:
          name: lake-build
          path: .lake/build

      - name: Build differential runner
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "false"

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then
            svm install "$SOLC_VERSION"
          fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch Solidity Yul corpora
        run: |
          git clone --depth 1 --filter=blob:none --sparse --branch develop \
            https://github.com/argotorg/solidity.git /tmp/solidity
          git -C /tmp/solidity sparse-checkout set \
            test/libyul/yulOptimizerTests \
            test/libyul/objectCompiler \
            test/libyul/evmCodeTransform

      # Behavior AND gas for the Yul corpora: each differential invocation also
      # takes a per-suite gas baseline and fails if this compiler's total gas for
      # a fixture rises above its pinned figure while solc's is unchanged. Re-pin
      # with scripts/update-gas.sh after an intended codegen or solc change.
      - name: Differentially execute against solc
        run: |
          if [[ "${{ matrix.kind }}" == "optimizer" ]]; then
            lake env lean --run scripts/CheckSoliditySolcDifferential.lean \
              optimizer \
              /tmp/solidity/test/libyul/yulOptimizerTests \
              test/solidity-yul-optimizer-known-solc-differential-failures.txt \
              test/solidity-yul-optimizer-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}"
          else
            status=0
            lake env lean --run scripts/CheckSoliditySolcDifferential.lean \
              object-compiler \
              /tmp/solidity/test/libyul/objectCompiler \
              test/solidity-yul-object-compiler-known-solc-differential-failures.txt \
              test/solidity-yul-object-compiler-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 || status=1
            lake env lean --run scripts/CheckSoliditySolcDifferential.lean \
              EVM-code-transform \
              /tmp/solidity/test/libyul/evmCodeTransform \
              test/solidity-yul-evm-code-transform-known-solc-differential-failures.txt \
              test/solidity-yul-evm-code-transform-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" 0 1 || status=1
            exit "$status"
          fi

  solidity-gas:
    name: Solidity gas (${{ matrix.name }})
    needs: gas-runner
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Curated gasTests: strict (every contract must compile). Small corpus,
          # one leg.
          - name: gasTests
            kind: gasTests
            shard_index: 0
            shard_count: 1
          # semanticTests: the large real-world corpus, lenient, sharded across
          # legs; each leg runs its shard across all cores (TEST_JOBS).
          - name: semanticTests 1/3
            kind: semantic
            shard_index: 0
            shard_count: 3
          - name: semanticTests 2/3
            kind: semantic
            shard_index: 1
            shard_count: 3
          - name: semanticTests 3/3
            kind: semantic
            shard_index: 2
            shard_count: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The gas runner is a statically linked native binary, so no Lean toolchain
      # is needed here — just the binary and solc.
      - name: Restore gas runner binary
        uses: actions/download-artifact@v4
        with:
          name: gas-runner-bin
          path: .lake/build/bin
      - name: Make gas runner executable
        run: chmod +x .lake/build/bin/checkSolidityGas

      - name: Cache pinned svm and solc
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/svm
            ~/.cargo/bin/solc
            ~/.local/share/svm/${{ env.SOLC_VERSION }}
          key: svm-${{ runner.os }}-${{ runner.arch }}-${{ env.SVM_VERSION }}-solc-${{ env.SOLC_VERSION }}

      - name: Install pinned solc with svm
        run: |
          if ! command -v svm >/dev/null 2>&1 || \
              ! svm --version | grep -q "^svm $SVM_VERSION "; then
            cargo install svm-rs --locked --version "$SVM_VERSION" --force
          fi
          if ! svm which "$SOLC_VERSION" >/dev/null 2>&1; then
            svm install "$SOLC_VERSION"
          fi
          solc_path="$(svm which "$SOLC_VERSION")"
          test -x "$solc_path"
          echo "SOLC_PATH=$solc_path" >> "$GITHUB_ENV"

      - name: Fetch Solidity gas corpora
        run: |
          git clone --depth 1 --filter=blob:none --sparse --branch develop \
            https://github.com/argotorg/solidity.git /tmp/solidity
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            git -C /tmp/solidity sparse-checkout set test/libsolidity/gasTests
          else
            git -C /tmp/solidity sparse-checkout set test/libsolidity/semanticTests
          fi

      # Compile each contract through solc's --via-ir pipeline and gas-compare the
      # optimized runtime against solc's; fails if a contract stops compiling or
      # its gas rises above the pin. gasTests is strict; semanticTests is lenient
      # (real-world corpus with many unsupported features) and sharded.
      - name: Compile and gas-check Solidity contracts
        run: |
          ulimit -s unlimited || true
          if [[ "${{ matrix.kind }}" == "gasTests" ]]; then
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/gasTests \
              test/solidity-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION"
          else
            .lake/build/bin/checkSolidityGas \
              /tmp/solidity/test/libsolidity/semanticTests \
              test/solidity-semantic-gas-baseline.txt \
              "$SOLC_PATH" "$SOLC_VERSION" \
              "${{ matrix.shard_index }}" "${{ matrix.shard_count }}" --lenient
          fi
