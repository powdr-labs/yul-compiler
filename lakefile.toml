name = "yul-evm-compiler"
version = "0.1.0"
defaultTargets = ["YulEvmCompiler", "YulParser", "YulEvmCompilerTests"]

# Source-language semantics: the Yul big-step judgment this compiler is proved against.
[[require]]
name = "yul-semantics"
git = "https://github.com/powdr-labs/yul-semantics"
rev = "81b9e3ecaf4f17e3ade277af20383f87dde70862"

# Target-language semantics: the EVM small-step/big-step relations.
[[require]]
name = "evm_semantics"
git = "https://github.com/powdr-labs/evm-semantics"
rev = "fcf5c24b3994a61e9f9aa8b1704525e9c7b38cb4"

[[lean_lib]]
name = "YulEvmCompiler"

[[lean_lib]]
name = "YulParser"

[[lean_lib]]
name = "YulEvmCompilerTests"

[[lean_exe]]
name = "yulc"
root = "YulParserMain"
