name = "yul-evm-compiler"
version = "0.1.0"
defaultTargets = ["YulEvmCompiler"]

# Source-language semantics: the Yul big-step judgment this compiler is proved against.
[[require]]
name = "yul-semantics"
git = "https://github.com/powdr-labs/yul-semantics"
rev = "f4e6187d684c0ebaee751750c5c368a4226abb73"

# Target-language semantics: the EVM small-step/big-step relations.
[[require]]
name = "evm_semantics"
git = "https://github.com/powdr-labs/evm-semantics"
rev = "d33a7801a55b18058cd94d2ac9df3dee32e6c6fd"

[[lean_lib]]
name = "YulEvmCompiler"
